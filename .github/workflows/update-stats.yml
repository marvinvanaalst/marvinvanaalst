name: Update lifetime stats

on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Run stats script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run scripts/update_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats_cache.json data/languages_cache.json \
            assets/stats-light.svg assets/stats-dark.svg \
            assets/languages-light.svg assets/languages-dark.svg
          git diff --cached --quiet || git commit -m "chore: update lifetime contribution stats"
          git push
